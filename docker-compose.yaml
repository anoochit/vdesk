services:
  vdesk-agents:
    build:
      context: ./vdesk-agents
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - MQTT_BROKER=mqtt
      - MQTT_PORT=1883
    volumes:
      - ./vdesk-agents:/app
    depends_on:
      - mqtt
    networks:
      - vdesk-net

  vdesk-web:
    build:
      context: ./vdesk-web
      dockerfile: Dockerfile
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_MQTT_BROKER_URL=ws://localhost:9001
    volumes:
      - ./vdesk-web:/app
      - /app/node_modules
    depends_on:
      - mqtt
    networks:
      - vdesk-net

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt_broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - vdesk-net

networks:
  vdesk-net:
    driver: bridge
